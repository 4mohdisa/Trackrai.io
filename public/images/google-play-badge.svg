<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" width="160" height="48">
  <!-- Background -->
  <rect width="160" height="48" rx="8" fill="#000"/>
  <!-- Google Play icon (colorful triangles) -->
  <polygon points="12,11 28,24 12,37" fill="url(#gp-grad)"/>
  <defs>
    <linearGradient id="gp-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00C6FF"/>
      <stop offset="100%" stop-color="#0072FF"/>
    </linearGradient>
  </defs>
  <polygon points="12,11 22,21 18,24" fill="#00E676" opacity="0.9"/>
  <polygon points="12,37 22,27 18,24" fill="#FF3D00" opacity="0.9"/>
  <polygon points="22,21 28,24 22,27" fill="#FFD600" opacity="0.9"/>
  <!-- Text: GET IT ON -->
  <text x="36" y="20" font-family="'Google Sans', Roboto, Helvetica, Arial, sans-serif" font-size="8.5" font-weight="400" fill="#fff" letter-spacing="0.8">GET IT ON</text>
  <!-- Text: Google Play -->
  <text x="36" y="36" font-family="'Google Sans', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="500" fill="#fff">Google Play</text>
</svg>
